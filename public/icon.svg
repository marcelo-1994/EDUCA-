<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <!-- 
    COMO PERSONALIZAR SEU ÍCONE:
    1. Fundo: Altere a cor '#09090b' (Preto/Zinco) abaixo para a cor desejada (ex: '#ffffff' para branco).
    2. Formato: Altere o 'rx="128"' para 'rx="256"' para um ícone totalmente redondo, ou 'rx="0"' para quadrado.
  -->
  <rect width="512" height="512" rx="128" fill="#09090b"/>
  
  <!-- 
    3. Símbolos de Código (< >): Altere o 'stroke="#3b82f6"' (Azul) para a cor da sua marca.
  -->
  <path d="M176 176L80 256L176 336" stroke="#3b82f6" stroke-width="48" stroke-linecap="round" stroke-linejoin="round" fill="none"/>
  <path d="M336 176L432 256L336 336" stroke="#3b82f6" stroke-width="48" stroke-linecap="round" stroke-linejoin="round" fill="none"/>
  
  <!-- 
    4. Ponto Central (IA): Altere o 'fill="#60a5fa"' (Azul claro) para outra cor.
  -->
  <circle cx="256" cy="256" r="48" fill="#60a5fa"/>
</svg>
